 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nyan Mobile</title>
<style>
  body {
    margin:0;
    background:black;
    text-align:center;
    color:white;
    font-family:sans-serif;
  }

  canvas {
    background:#111;
    display:block;
    margin:auto;
  }

  .controls {
    margin-top:10px;
  }

  button {
    width:90px;
    height:50px;
    font-size:18px;
    margin:5px;
  }
</style>
</head>
<body>

<canvas id="game" width="300" height="400"></canvas>

<div class="controls">
  <button onclick="jump()">⬆️ Voar</button>
  <button onclick="pauseGame()">⏸</button>
  <button onclick="restartGame()">🔄</button>
</div>

<h2 id="score">Score: 0</h2>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let img = new Image();
img.src = "https://upload.wikimedia.org/wikipedia/en/2/2c/Nyan_cat_250px_frame.PNG";

let y = 150;
let velocity = 0;
let gravity = 0.6;
let score = 0;
let running = true;

// botão
function jump() {
  if (running) velocity = -10;
}

// toque na tela também funciona
canvas.addEventListener("touchstart", () => {
  jump();
});

function draw() {
  ctx.clearRect(0,0,300,400);

  ctx.drawImage(img, 110, y, 80, 50);

  ctx.fillStyle = "white";
  ctx.fillText("Toque pra voar", 90, 20);
}

function update() {
  if (running) {
    velocity += gravity;
    y += velocity;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    // limites
    if (y > 350) {
      y = 350;
      velocity = 0;
    }
    if (y < 0) {
      y = 0;
      velocity = 0;
    }
  }

  draw();
  requestAnimationFrame(update);
}

function pauseGame() {
  running = !running;
}

function restartGame() {
  y = 150;
  velocity = 0;
  score = 0;
  running = true;
}

update();
</script>

</body>
</html>
