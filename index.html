<!DOCTYPE html>
<html>
<head>
  <title>Sapo Game 🐸</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// imagem do sapo
let img = new Image();
img.src = "https://raw.githubusercontent.com/daviluisdesouza82-creator/Meusite/main/f6100026-ab9e-43a6-9280-93c8b1dadf45.png?v=999";

// player
let player = {
  x: canvas.width/2 - 60,
  y: canvas.height - 150,
  w: 120,
  h: 120,
  speed: 10
};

// obstáculos
let obstacles = [];

// controles
let left=false, right=false;

// 📱 MOBILE
canvas.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;

  if(x < canvas.width/2) left = true;
  else right = true;
});

canvas.addEventListener("touchend", ()=>{
  left=false;
  right=false;
});

// ⌨️ TECLADO
document.addEventListener("keydown", e=>{
  if(e.key=="ArrowLeft") left=true;
  if(e.key=="ArrowRight") right=true;
});

document.addEventListener("keyup", e=>{
  if(e.key=="ArrowLeft") left=false;
  if(e.key=="ArrowRight") right=false;
});

// spawn obstáculos
function spawnObstacle(){
  obstacles.push({
    x: Math.random() * (canvas.width - 50),
    y: -50,
    w: 50,
    h: 50,
    speed: 4 + Math.random()*3
  });
}

// reset
function resetGame(){
  player.x = canvas.width/2 - 60;
  player.y = canvas.height - 150;
  obstacles = [];
}

// colisão
function collide(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// update
function update(){

  // movimento lateral
  if(left) player.x -= player.speed;
  if(right) player.x += player.speed;

  // movimento pra frente automático
  player.y -= 2;

  // limite topo
  if(player.y < 50) player.y = 50;

  // limites laterais
  if(player.x < 0) player.x = 0;
  if(player.x > canvas.width - player.w)
    player.x = canvas.width - player.w;

  // atualizar obstáculos
  for(let o of obstacles){
    o.y += o.speed;

    if(collide(player, o)){
      alert("PERDEU 😭");
      resetGame();
      return;
    }
  }

  // limpar antigos
  obstacles = obstacles.filter(o => o.y < canvas.height);

  draw();
  requestAnimationFrame(update);
}

// desenhar
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // player (sapo)
  ctx.drawImage(img, player.x, player.y, player.w, player.h);

  // obstáculos
  ctx.fillStyle = "red";
  for(let o of obstacles){
    ctx.fillRect(o.x, o.y, o.w, o.h);
  }
}

// iniciar
img.onload = ()=>{
  setInterval(spawnObstacle, 1000);
  update();
};
</script>

</body>
</html>
