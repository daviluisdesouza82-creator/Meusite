<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welenom Runner 🌌</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

/* NAVE */
#nave {
  position: absolute;
  bottom: 20px;
  left: 50%;
  width: 60px;
  height: 60px;
  background: cyan;
}

/* ASTEROIDE */
.asteroide {
  position: absolute;
  width: 40px;
  height: 40px;
  background: gray;
  border-radius: 50%;
}

/* TEXTO */
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="nave"></div>
<div id="info">Pontos: 0 | Galáxia: Via Láctea</div>

<script>
let nave = document.getElementById("nave");
let info = document.getElementById("info");

let x = window.innerWidth / 2;
let score = 0;
let galaxia = "Via Láctea";
let asteroides = [];

// mover nave
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") x -= 30;
  if (e.key === "ArrowRight") x += 30;
  nave.style.left = x + "px";
});

// criar asteroide
function criarAsteroide() {
  let a = document.createElement("div");
  a.classList.add("asteroide");
  a.style.left = Math.random() * window.innerWidth + "px";
  a.style.top = "0px";
  document.body.appendChild(a);
  asteroides.push(a);
}

setInterval(criarAsteroide, 800);

// loop do jogo
setInterval(() => {
  score++;

  if (score >= 100) galaxia = "Andrômeda";
  if (score >= 200) galaxia = "Welenom 💀";

  info.innerText = "Pontos: " + score + " | Galáxia: " + galaxia;

  asteroides.forEach((a, i) => {
    let top = parseInt(a.style.top);
    a.style.top = top + 7 + "px";

    let naveRect = nave.getBoundingClientRect();
    let aRect = a.getBoundingClientRect();

    // colisão
    if (
      naveRect.left < aRect.right &&
      naveRect.right > aRect.left &&
      naveRect.top < aRect.bottom &&
      naveRect.bottom > aRect.top
    ) {
      alert("GAME OVER 💀");
      location.reload();
    }

    // remover
    if (top > window.innerHeight) {
      a.remove();
      asteroides.splice(i, 1);
    }
  });

}, 50);
</script>

</body>
</html>
