<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ib Draw Pro</title>

<style>
body {
  margin:0;
  background:#1e1e1e;
  color:white;
  font-family:sans-serif;
}

.top {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

canvas {
  background:white;
  display:block;
  margin:auto;

  /* 🔍 ZOOM (câmera mais perto) */
  transform: scale(1.5);
  transform-origin: top center;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  background:#111;
  padding:10px;
}

button, input {
  margin:5px;
  padding:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="top">
  <div>🎨 Ib Draw Pro</div>
  <div>Ib: Ibis Paint x</div>
</div>

<!-- resolução maior (melhor qualidade) -->
<canvas id="canvas" width="600" height="800"></canvas>

<div class="controls">
  🎨 <input type="color" id="color">
  🖌 <input type="range" id="size" min="1" max="30" value="5">

  <button onclick="setBrush()">✏️ Pincel</button>
  <button onclick="setEraser()">🧽 Borracha</button>

  <button onclick="clearCanvas()">🧹 Limpar</button>
  <button onclick="saveImage()">💾 Salvar</button>

  <button onclick="addFrame()">➕ Frame</button>
  <button onclick="nextFrame()">➡️ Próx</button>
  <button onclick="playAnim()">▶️ Play</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let mode = "brush";

let frames = [];
let currentFrame = 0;

// toque
canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stop);

function start(e){
  drawing = true;
}

function stop(){
  drawing = false;
  ctx.beginPath();
}

function draw(e){
  if(!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const y = (e.touches[0].clientY - rect.top) * scaleY;

  ctx.lineWidth = document.getElementById("size").value;
  ctx.lineCap = "round";

  if(mode === "brush"){
    ctx.strokeStyle = document.getElementById("color").value;
  } else {
    ctx.strokeStyle = "white";
  }

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

// modos
function setBrush(){ mode = "brush"; }
function setEraser(){ mode = "eraser"; }

// limpar
function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// salvar
function saveImage(){
  let link = document.createElement("a");
  link.download = "desenho.png";
  link.href = canvas.toDataURL();
  link.click();
}

// frames
function addFrame(){
  frames.push(canvas.toDataURL());
  alert("Frame salvo!");
}

function nextFrame(){
  if(frames.length === 0) return;

  currentFrame++;
  if(currentFrame >= frames.length) currentFrame = 0;

  let img = new Image();
  img.src = frames[currentFrame];
  img.onload = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);
  }
}

// animação
function playAnim(){
  if(frames.length === 0) return;

  let i = 0;
  setInterval(() => {
    let img = new Image();
    img.src = frames[i];

    img.onload = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0);
    };

    i++;
    if(i >= frames.length) i = 0;
  }, 200);
}
</script>

</body>
</html>
