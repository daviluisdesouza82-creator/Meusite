<!DOCTYPE html>
<html>
<head>
  <title>Meu Jogo</title>
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white;">

<h1>🎮 Meu Jogo 🔥</h1>

<button onclick="iniciar()" style="padding:10px; font-size:18px;">JOGAR</button>

<div id="jogo" style="display:none; margin-top:20px;">

  <h2 id="fase">Fase 1</h2>
  <p id="vida">Vida: ❤️❤️❤️</p>

  <!-- CAMERA (mais alto e centralizado) -->
  <div style="margin-top:40px; font-size:80px;">
    <span id="player">🧑</span>
    <span id="enemy">👾</span>
  </div>

  <br>

  <button onclick="atacar()">⚔️ Atacar</button>
  <button onclick="defender()">🛡️ Defender</button>

  <p id="status"></p>

</div>

<script>
let vida = 3;
let fase = 1;
let inimigo = 5;

function iniciar() {
  document.getElementById("jogo").style.display = "block";
  animarInimigo();
  ataqueInimigo();
}

function atualizar() {
  document.getElementById("fase").innerText = "Fase " + fase;
  document.getElementById("vida").innerText = "Vida: " + "❤️".repeat(vida);
}

function atacar() {
  inimigo--;

  document.getElementById("player").innerText = "⚔️";

  setTimeout(() => {
    document.getElementById("player").innerText = "🧑";
  }, 200);

  if (inimigo <= 0) {
    fase++;

    if (fase > 10) {
      document.getElementById("status").innerText = "🏆 VENCEU!";
      reiniciar();
      return;
    }

    inimigo = fase * 2 + 3; // fases maiores
    document.getElementById("status").innerText = "🔥 Próxima fase!";
  }

  atualizar();
}

function defender() {
  document.getElementById("status").innerText = "🛡️ Defendeu!";
}

function ataqueInimigo() {
  setInterval(() => {
    if (vida <= 0) return;

    vida--;

    document.getElementById("enemy").innerText = "👹";

    setTimeout(() => {
      document.getElementById("enemy").innerText = "👾";
    }, 300);

    if (vida <= 0) {
      document.getElementById("status").innerText = "💀 Você morreu!";
      reiniciar();
    }

    atualizar();

  }, 2000); // inimigo ataca sozinho
}

function animarInimigo() {
  setInterval(() => {
    let enemy = document.getElementById("enemy");
    enemy.style.transform = "translateX(" + (Math.random()*80 - 40) + "px)";
  }, 400);
}

function reiniciar() {
  setTimeout(() => {
    vida = 3;
    fase = 1;
    inimigo = 5;
    atualizar();
    document.getElementById("status").innerText = "";
  }, 2000);
}
</script>

</body>
</html>
