<!DOCTYPE html>
<html>
<head>
  <title>Sapo Game 🐸🚗</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// player
let player = {
  x: canvas.width/2 - 25,
  y: canvas.height - 120,
  w: 50,
  h: 50,
  speed: 7
};

// imagem
let img = new Image();
img.src = "f6100026-ab9e-43a6-9280-93c8b1dadf45.png";

// controles
let moveLeft = false;
let moveRight = false;

// toque (celular)
canvas.addEventListener("touchstart", e => {
  let x = e.touches[0].clientX;
  if(x < canvas.width/2) moveLeft = true;
  else moveRight = true;
});

canvas.addEventListener("touchend", () => {
  moveLeft = false;
  moveRight = false;
});

// teclado (PC)
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// obstáculos
let obstacles = [];

function spawnObstacle(){
  obstacles.push({
    x: Math.random() * (canvas.width - 50),
    y: -60,
    w: 50,
    h: 50,
    speed: 4 + Math.random()*3
  });
}

setInterval(spawnObstacle, 1000);

// colisão
function collide(a, b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// loop
function update(){

  // movimento
  if(keys["ArrowLeft"] || keys["a"] || moveLeft) player.x -= player.speed;
  if(keys["ArrowRight"] || keys["d"] || moveRight) player.x += player.speed;

  // limites
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // fundo
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // player
  ctx.drawImage(img, player.x, player.y, player.w, player.h);

  // obstáculos
  ctx.fillStyle = "red";
  for(let i=0;i<obstacles.length;i++){
    let o = obstacles[i];
    o.y += o.speed;

    ctx.fillRect(o.x, o.y, o.w, o.h);

    if(collide(player, o)){
      alert("💀 GAME OVER");
      location.reload();
    }
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
