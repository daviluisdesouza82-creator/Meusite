<!DOCTYPE html>
<html>
<head>
  <title>Meu Jogo</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>🎮 Meu Jogo 🔥</h1>

<button onclick="iniciar()">JOGAR</button>

<div id="jogo" style="display:none; margin-top:20px;">

  <h2 id="fase">Fase 1</h2>
  <p id="vida">Vida: ❤️❤️❤️</p>

  <!-- PERSONAGEM E INIMIGO -->
  <div style="font-size:50px;">
    <span id="player">🧑</span>
    ⚔️
    <span id="enemy">👾</span>
  </div>

  <br>

  <button onclick="atacar()">⚔️ Atacar</button>
  <button onclick="defender()">🛡️ Defender</button>

  <p id="status"></p>

</div>

<script>
let vida = 3;
let fase = 1;
let inimigo = 3;

function iniciar() {
  document.getElementById("jogo").style.display = "block";
}

function atualizar() {
  document.getElementById("fase").innerText = "Fase " + fase;

  let coracoes = "❤️".repeat(vida);
  document.getElementById("vida").innerText = "Vida: " + coracoes;
}

function atacar() {
  inimigo--;

  // animação ataque
  document.getElementById("player").innerText = "⚔️";

  setTimeout(() => {
    document.getElementById("player").innerText = "🧑";
  }, 300);

  if (inimigo <= 0) {
    fase++;

    if (fase > 10) {
      document.getElementById("status").innerText = "🏆 VOCÊ VENCEU!";
      reiniciar();
      return;
    }

    inimigo = fase + 2;
    document.getElementById("enemy").innerText = "💀";
    document.getElementById("status").innerText = "Inimigo derrotado!";
  } else {
    tomarDano();
  }

  atualizar();
}

function defender() {
  document.getElementById("status").innerText = "🛡️ Defendeu!";
}

function tomarDano() {
  vida--;

  document.getElementById("enemy").innerText = "👹";

  setTimeout(() => {
    document.getElementById("enemy").innerText = "👾";
  }, 300);

  if (vida <= 0) {
    document.getElementById("status").innerText = "💀 Você morreu!";
    reiniciar();
  }
}

function reiniciar() {
  setTimeout(() => {
    vida = 3;
    fase = 1;
    inimigo = 3;
    atualizar();
    document.getElementById("status").innerText = "";
  }, 2000);
}
</script>

</body>
</html>
