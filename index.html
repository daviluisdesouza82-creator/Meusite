<!DOCTYPE html>
<html>
<head>
  <title>Meu Jogo 🎮</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    button {
      padding: 20px;
      font-size: 20px;
      background: lime;
      border: none;
      border-radius: 10px;
    }
    img {
      margin: 20px;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<h1>🎮 Meu Jogo</h1>

<img src="https://i.imgur.com/4AiXzf8.jpeg" width="200">

<p>Pontos: <span id="pontos">0</span></p>

<button onclick="clicar()">🔥 CLICA AQUI 🔥</button>

<script>
let pontos = 0;

function clicar() {
  pontos++;
  document.getElementById("pontos").innerText = pontos;
}
</script>

</body>
</html>
