<!DOCTYPE html>
<html>
<head>
<title>Sapo Runner Infinito 🐸🔥</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// imagem
let img = new Image();
img.src = "https://raw.githubusercontent.com/daviluisdesouza82-creator/Meusite/main/f6100026-ab9e-43a6-9280-93c8b1dadf45.png?v=2000";

// player fixo
let player = {
  x: canvas.width/2 - 40,
  y: canvas.height - 120,
  w: 80,
  h: 80,
  speed: 8
};

let obstacles = [];
let gameOver = false;

// estrada animada
let roadOffset = 0;

// controles
let left=false, right=false;

// mobile
canvas.addEventListener("touchmove", e=>{
  let x = e.touches[0].clientX;

  left = false;
  right = false;

  if(x < canvas.width/2) left = true;
  else right = true;
});

canvas.addEventListener("touchend", ()=>{
  left=false;
  right=false;
});

// spawn
function spawn(){
  obstacles.push({
    x: Math.random() * (canvas.width - 60),
    y: -60,
    w: 60,
    h: 60,
    speed: 6
  });
}

// colisão
function collide(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// restart
function restart(){
  obstacles = [];
  gameOver = false;
}

// update
function update(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gameOver){

    // mover lados
    if(left) player.x -= player.speed;
    if(right) player.x += player.speed;

    // atravessar parede
    if(player.x < -player.w) player.x = canvas.width;
    if(player.x > canvas.width) player.x = -player.w;

    // estrada infinita
    roadOffset += 5;

    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;

    for(let i=0;i<canvas.height;i+=40){
      ctx.beginPath();
      ctx.moveTo(canvas.width/2, i + roadOffset % 40);
      ctx.lineTo(canvas.width/2, i + 20 + roadOffset % 40);
      ctx.stroke();
    }

    // obstáculos
    for(let o of obstacles){
      o.y += o.speed;

      ctx.fillStyle="red";
      ctx.fillRect(o.x,o.y,o.w,o.h);

      if(collide(player,o)){
        gameOver = true;
      }
    }

    obstacles = obstacles.filter(o => o.y < canvas.height);

    // sapo
    ctx.drawImage(img, player.x, player.y, player.w, player.h);

  } else {
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("PERDEU 😭", canvas.width/2-80, canvas.height/2);
    ctx.fillText("TOQUE PRA VOLTAR", canvas.width/2-100, canvas.height/2+40);
  }

  requestAnimationFrame(update);
}

// revive
canvas.addEventListener("touchstart", ()=>{
  if(gameOver) restart();
});

// start
img.onload = ()=>{
  setInterval(spawn, 800);
  update();
};
</script>

</body>
</html>
