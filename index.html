<!DOCTYPE html>
<html>
<head>
  <title>Sapo Game 🐸</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// imagem do sapo (com cache atualizado)
let img = new Image();
img.src = "https://raw.githubusercontent.com/daviluisdesouza82-creator/Meusite/main/f6100026-ab9e-43a6-9280-93c8b1dadf45.png?v=100";

// variáveis
let player, obstacles, gameOver;

// iniciar jogo
function resetGame(){
  player = {
    x: canvas.width/2 - 60,
    y: canvas.height - 150,
    w: 120,
    h: 120,
    speed: 8
  };

  obstacles = [];
  gameOver = false;
}

resetGame();

// controles
let left = false;
let right = false;

// celular
canvas.addEventListener("touchstart", e=>{
  let x = e.touches[0].clientX;
  if(x < canvas.width/2) left = true;
  else right = true;
});

canvas.addEventListener("touchend", ()=>{
  left = false;
  right = false;
});

// teclado
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowLeft") left = true;
  if(e.key === "ArrowRight") right = true;
});

document.addEventListener("keyup", e=>{
  if(e.key === "ArrowLeft") left = false;
  if(e.key === "ArrowRight") right = false;
});

// criar obstáculos
function spawn(){
  obstacles.push({
    x: Math.random()*(canvas.width-60),
    y: -60,
    w: 60,
    h: 60,
    speed: 5 + Math.random()*3
  });
}

setInterval(spawn, 900);

// colisão
function colide(a,b){
  return a.x < b.x+b.w &&
         a.x+a.w > b.x &&
         a.y < b.y+b.h &&
         a.y+a.h > b.y;
}

// loop do jogo
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gameOver){

    // movimento
    if(left) player.x -= player.speed;
    if(right) player.x += player.speed;

    // limites
    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width-player.w)
      player.x = canvas.width-player.w;

    // desenhar sapo (FORÇADO GRANDE)
    ctx.drawImage(img, player.x, player.y, player.w, player.h);

    // obstáculos
    for(let o of obstacles){
      o.y += o.speed;

      ctx.fillStyle = "red";
      ctx.fillRect(o.x,o.y,o.w,o.h);

      if(colide(player,o)){
        gameOver = true;
        setTimeout(resetGame, 1500);
      }
    }

  } else {
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("PERDEU 😭", canvas.width/2-80, canvas.height/2);
  }

  requestAnimationFrame(update);
}

// 🔥 só começa depois da imagem carregar
img.onload = () => {
  update();
};
</script>

</body>
</html>
