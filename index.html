<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nyan Game</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

canvas {
  background:#111;
  display:block;
  margin:auto;
}

.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

button {
  width: 90px;
  height: 50px;
  font-size: 18px;
}

.spacer {
  height: 80px;
}
</style>
</head>

<body>

<h2 id="score">Score: 0</h2>

<canvas id="game" width="300" height="350"></canvas>

<div class="spacer"></div>

<div class="controls">
  <button onclick="jump()">⬆️</button>
  <button onclick="pauseGame()">⏸</button>
  <button onclick="restartGame()">🔄</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let img = new Image();
img.src = "https://upload.wikimedia.org/wikipedia/en/2/2c/Nyan_cat_250px_frame.PNG";

let loaded = false;
let gameOver = false;

let y = 150;
let velocity = 0;
let gravity = 0.6;
let score = 0;
let running = false;

// só começa quando carregar
img.onload = () => {
  loaded = true;
  running = true;
};

// botão
function jump() {
  if (running && !gameOver) velocity = -10;
}

// toque
canvas.addEventListener("touchstart", () => {
  jump();
});

// desenhar
function draw() {
  ctx.clearRect(0,0,300,350);

  if (!loaded) {
    ctx.fillStyle = "white";
    ctx.fillText("Carregando...", 100, 150);
    return;
  }

  ctx.drawImage(img, 110, y, 80, 50);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "20px sans-serif";
    ctx.fillText("VOCÊ MORREU", 70, 150);
  }
}

// atualizar
function update() {
  if (running && !gameOver) {
    velocity += gravity;
    y += velocity;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    // morreu se cair
    if (y >= 300) {
      y = 300;
      gameOver = true;
      running = false;
    }

    if (y < 0) {
      y = 0;
      velocity = 0;
    }
  }

  draw();
  requestAnimationFrame(update);
}

// pause
function pauseGame() {
  if (!gameOver) running = !running;
}

// restart
function restartGame() {
  y = 150;
  velocity = 0;
  score = 0;
  gameOver = false;
  running = true;
}

update();
</script>

</body>
</html>
