<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welenom Runner 🌌</title>

<!-- FORÇA UPDATE -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
}

#nave {
  position: absolute;
  bottom: 20px;
  left: 50%;
  width: 50px;
  height: 50px;
  background: white;
}

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<div id="nave"></div>
<div id="info">Pontos: 0 | Galáxia: Via Láctea</div>

<script>
let nave = document.getElementById("nave");
let info = document.getElementById("info");

let x = window.innerWidth / 2;
let score = 0;
let galaxia = "Via Láctea";

// movimento
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") x -= 20;
  if (e.key === "ArrowRight") x += 20;

  nave.style.left = x + "px";
});

// pontuação
setInterval(() => {
  score++;

  if (score >= 100) galaxia = "Andrômeda";
  if (score >= 200) galaxia = "Welenom 💀";

  info.innerText = "Pontos: " + score + " | Galáxia: " + galaxia;
}, 200);
</script>

</body>
</html>
