<!DOCTYPE html>
<html>
<head>
  <title>Backrooms FPS</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cfc56d;
      font-family: Arial;
      touch-action: none;
    }

    #game {
      width: 3000px;
      height: 3000px;
      position: relative;

      background:
      repeating-linear-gradient(
        90deg,
        #cfc56d 0px,
        #cfc56d 100px,
        #bdb45f 100px,
        #bdb45f 105px
      );
    }

    .wall {
      position: absolute;
      background: #b8af58;
      border: 5px solid #8d853f;
    }

    .light {
      position: absolute;
      background: white;
      height: 20px;
      box-shadow: 0 0 30px white;
    }

    #monster {
      position: fixed;
      font-size: 100px;
      right: 100px;
      bottom: 100px;
      display: none;
      z-index: 999;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      z-index: 999;
    }

    #text {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.7);
      padding: 10px;
      border-radius: 10px;
      z-index: 999;
    }
  </style>
</head>

<body>

<div id="game">

  <div class="wall" style="left:100px;top:100px;width:200px;height:200px;"></div>

  <div class="wall" style="right:150px;top:150px;width:250px;height:180px;"></div>

  <div class="wall" style="left:600px;top:500px;width:300px;height:200px;"></div>

  <div class="wall" style="left:1200px;top:900px;width:250px;height:250px;"></div>

  <div class="wall" style="left:1800px;top:700px;width:400px;height:200px;"></div>

  <div class="light" style="left:200px;top:40px;width:150px;"></div>

  <div class="light" style="right:200px;top:40px;width:150px;"></div>

  <div class="light" style="left:900px;top:300px;width:150px;"></div>

  <div class="light" style="left:1600px;top:600px;width:150px;"></div>

</div>

<div id="monster">👁️</div>

<div id="crosshair">+</div>

<div id="text">
  Arraste o dedo para andar
</div>

<script>

let monster = document.getElementById("monster");

let startX = 0;
let startY = 0;

setInterval(() => {

  let random = Math.random();

  if(random > 0.97){

    monster.style.display = "block";

    setTimeout(() => {
      monster.style.display = "none";
    }, 1000);

  }

}, 500);

// CONTROLE MOBILE

document.addEventListener("touchstart", (e) => {

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

});

document.addEventListener("touchmove", (e) => {

  let moveX = e.touches[0].clientX;
  let moveY = e.touches[0].clientY;

  let dx = moveX - startX;
  let dy = moveY - startY;

  window.scrollBy(-dx * 1.5, -dy * 1.5);

  startX = moveX;
  startY = moveY;

});

</script>

</body>
</html>
