<!DOCTYPE html>
<html>
<head>
  <title>Meu Jogo</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>🎮 Meu Jogo 🔥</h1>

<button onclick="iniciar()">JOGAR</button>

<div id="jogo" style="display:none;">
  <h2 id="fase">Fase 1</h2>
  <p id="vida">Vida: 3</p>

  <button onclick="atacar()">⚔️ Atacar</button>
  <button onclick="defender()">🛡️ Defender</button>

  <p id="status"></p>
</div>

<script>
let vida = 3;
let fase = 1;
let inimigo = 3;

function iniciar() {
  document.getElementById("jogo").style.display = "block";
}

function atualizar() {
  document.getElementById("vida").innerText = "Vida: " + vida;
  document.getElementById("fase").innerText = "Fase " + fase;
}

function atacar() {
  inimigo--;

  if (inimigo <= 0) {
    fase++;
    if (fase > 10) {
      document.getElementById("status").innerText = "🏆 VOCÊ VENCEU O JOGO!";
      reiniciar();
      return;
    }
    inimigo = fase + 2;
    document.getElementById("status").innerText = "Inimigo derrotado! Próxima fase!";
  } else {
    tomarDano();
  }

  atualizar();
}

function defender() {
  document.getElementById("status").innerText = "Você defendeu!";
}

function tomarDano() {
  vida--;

  if (vida <= 0) {
    document.getElementById("status").innerText = "💀 Você morreu!";
    reiniciar();
  }
}

function reiniciar() {
  setTimeout(() => {
    vida = 3;
    fase = 1;
    inimigo = 3;
    atualizar();
    document.getElementById("status").innerText = "";
  }, 2000);
}
</script>

</body>
</html>
