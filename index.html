<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nyan Game</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

/* jogo */
canvas {
  background:#111;
  display:block;
  margin:auto;
}

/* botões embaixo */
.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

button {
  width: 90px;
  height: 50px;
  font-size: 18px;
}

/* espaço pro botão não tampar o jogo */
.spacer {
  height: 80px;
}
</style>
</head>

<body>

<h2 id="score">Score: 0</h2>

<canvas id="game" width="300" height="350"></canvas>

<div class="spacer"></div>

<div class="controls">
  <button onclick="jump()">⬆️</button>
  <button onclick="pauseGame()">⏸</button>
  <button onclick="restartGame()">🔄</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let img = new Image();
img.src = "https://upload.wikimedia.org/wikipedia/en/2/2c/Nyan_cat_250px_frame.PNG";

let y = 150;
let velocity = 0;
let gravity = 0.6;
let score = 0;
let running = true;

// botão
function jump() {
  if (running) velocity = -10;
}

// toque na tela
canvas.addEventListener("touchstart", () => {
  jump();
});

// desenhar
function draw() {
  ctx.clearRect(0,0,300,350);

  ctx.drawImage(img, 110, y, 80, 50);

  ctx.fillStyle = "white";
  ctx.fillText("Toque pra voar", 90, 20);
}

// atualizar
function update() {
  if (running) {
    velocity += gravity;
    y += velocity;

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    if (y > 300) {
      y = 300;
      velocity = 0;
    }
    if (y < 0) {
      y = 0;
      velocity = 0;
    }
  }

  draw();
  requestAnimationFrame(update);
}

// pause
function pauseGame() {
  running = !running;
}

// restart
function restartGame() {
  y = 150;
  velocity = 0;
  score = 0;
  running = true;
}

update();
</script>

</body>
</html>
