<!DOCTYPE html>
<html>
<head>
  <title>Sapo Game 🐸🚗</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER (SAPO)
let player = {
  x: canvas.width / 2 - 40,
  y: canvas.height - 120,
  w: 80,
  h: 80,
  speed: 8
};

// IMAGEM DO SAPO (RAW CORRETO)
let img = new Image();
img.src = "https://raw.githubusercontent.com/daviluisdesouza82-creator/Meusite/main/f6100026-ab9e-43a6-9280-93c8b1dadf45.png?v=2";

// CONTROLES MOBILE
let moveLeft = false;
let moveRight = false;

canvas.addEventListener("touchstart", e => {
  let x = e.touches[0].clientX;
  if (x < canvas.width / 2) moveLeft = true;
  else moveRight = true;
});

canvas.addEventListener("touchend", () => {
  moveLeft = false;
  moveRight = false;
});

// OBSTÁCULOS
let obstacles = [];

function spawnObstacle(){
  obstacles.push({
    x: Math.random() * (canvas.width - 50),
    y: -60,
    w: 50,
    h: 50,
    speed: 4 + Math.random() * 3
  });
}

setInterval(spawnObstacle, 1000);

// DETECÇÃO DE COLISÃO
function collide(a, b){
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// LOOP DO JOGO
function update(){

  // mover sapo
  if (moveLeft) player.x -= player.speed;
  if (moveRight) player.x += player.speed;

  // limites
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // limpar tela
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // desenhar sapo
  if (img.complete) {
    ctx.drawImage(img, player.x, player.y, player.w, player.h);
  } else {
    ctx.fillStyle = "green";
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }

  // obstáculos
  ctx.fillStyle = "red";
  obstacles.forEach((obs, i) => {
    obs.y += obs.speed;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

    if (collide(player, obs)){
      alert("Perdeu 😭");
      location.reload();
    }

    if (obs.y > canvas.height){
      obstacles.splice(i, 1);
    }
  });

  requestAnimationFrame(update);
}

// ESPERA A IMAGEM CARREGAR
img.onload = () => {
  update();
};
</script>

</body>
</html>
