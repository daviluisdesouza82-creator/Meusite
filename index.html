<!DOCTYPE html>
<html>
<head>
<title>Welenom Runner 🌌</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial;
  }

  #nave {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 50px;
    height: 50px;
    background: white;
  }

  #info {
    position: absolute;
    top: 10px;
    left: 10px;
  }
</style>
</head>

<body>

<div id="nave"></div>
<div id="info">Pontos: 0 | Galáxia: Via Láctea</div>

<script>
let nave = document.getElementById("nave");
let info = document.getElementById("info");

let x = window.innerWidth / 2;
let score = 0;
let galaxia = "Via Láctea";

// mover nave
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") x -= 20;
  if (e.key === "ArrowRight") x += 20;

  nave.style.left = x + "px";
});

// pontuação
setInterval(() => {
  score++;

  // muda galáxia
  if (score >= 100) galaxia = "Andrômeda";
  if (score >= 200) galaxia = "Welenom 💀";

  info.innerText = "Pontos: " + score + " | Galáxia: " + galaxia;
}, 200);

</script>

</body>
</html>
