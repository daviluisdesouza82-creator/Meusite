<script>
let nave = document.getElementById("nave");
let info = document.getElementById("info");

let x = window.innerWidth / 2 - 40; // centralizado
let score = 0;
let asteroides = [];

// mover nave
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") x -= 30;
  if (e.key === "ArrowRight") x += 30;

  // não sair da tela
  if (x < 0) x = 0;
  if (x > window.innerWidth - 80) x = window.innerWidth - 80;

  nave.style.left = x + "px";
});

// criar asteroide
function criarAsteroide() {
  let a = document.createElement("div");
  a.className = "asteroide";
  a.style.left = Math.random() * (window.innerWidth - 40) + "px";
  a.style.top = "0px";
  document.body.appendChild(a);
  asteroides.push(a);
}

setInterval(criarAsteroide, 800);

// loop do jogo
setInterval(() => {
  score++;
  info.innerText = "Pontos: " + score;

  asteroides.forEach((a, i) => {
    let top = parseInt(a.style.top) || 0;
    a.style.top = top + 7 + "px";

    let naveRect = nave.getBoundingClientRect();
    let aRect = a.getBoundingClientRect();

    // colisão
    if (
      naveRect.left < aRect.right &&
      naveRect.right > aRect.left &&
      naveRect.top < aRect.bottom &&
      naveRect.bottom > aRect.top
    ) {
      alert("GAME OVER 💀");
      location.reload();
    }

    // remover quando sair
    if (top > window.innerHeight) {
      a.remove();
      asteroides.splice(i, 1);
    }
  });

}, 50);
</script>
