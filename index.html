<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sla</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

/* topo */
.header {
  background:#202020;
  padding:10px;
  display:flex;
  align-items:center;
}

.logo {
  font-weight:bold;
  font-size:20px;
  margin-right:10px;
}

input {
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  outline:none;
  border-radius:5px;
}

/* vídeos */
.videos {
  padding:10px;
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

.video {
  background:#181818;
  border-radius:10px;
  overflow:hidden;
}

iframe {
  width:100%;
  height:200px;
  border:none;
}

.title {
  padding:10px;
  font-size:15px;
}

/* barra inferior */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#202020;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.bottom div {
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Sla</div>
  <input type="text" id="search" placeholder="Pesquisar..." oninput="searchVideos()">
</div>

<div class="videos" id="videos"></div>

<div style="height:70px;"></div>

<div class="bottom">
  <div>🏠 Home</div>
  <div>🔥 Em alta</div>
  <div>📺 Inscrições</div>
</div>

<script>
const videoList = [
  {title:"Milkurtz - Vídeo", id:"QH2-TGUlwu4"},
  {title:"Jazzghost - Minecraft", id:"MmB9b5njVbA"},
  {title:"MelBoniTao - Gameplay", id:"2g811Eo7K8U"},
  {title:"PlayGuima - Highlights", id:"J---aiyznGQ"},
  {title:"Milkurtz - Outro vídeo", id:"dQw4w9WgXcQ"},
  {title:"Jazzghost - Aventura", id:"9bZkp7q19f0"},
  {title:"MelBoniTao - Desafio", id:"3JZ_D3ELwOQ"},
  {title:"PlayGuima - Gameplay", id:"RgKAFK5djSk"}
];

function loadVideos(list) {
  const container = document.getElementById("videos");
  container.innerHTML = "";

  list.forEach(v => {
    container.innerHTML += `
      <div class="video">
        <iframe src="https://www.youtube.com/embed/${v.id}"></iframe>
        <div class="title">${v.title}</div>
      </div>
    `;
  });
}

function searchVideos() {
  let text = document.getElementById("search").value.toLowerCase();

  let filtered = videoList.filter(v =>
    v.title.toLowerCase().includes(text)
  );

  loadVideos(filtered);
}

// iniciar
loadVideos(videoList);
</script>

</body>
</html>
